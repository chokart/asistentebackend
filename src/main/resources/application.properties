spring.application.name=Asistente
server.port=3001

# Configuración de la base de datos (Usando el nombre del contenedor de Dokploy)
spring.datasource.url=jdbc:postgresql://qhasistente-dbasistente:5432/bdasistente
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración Telegram Bot
bot.token=${TELEGRAM_BOT_TOKEN}
bot.username=${TELEGRAM_BOT_NAME}

# Configuración Groq IA
groq.api.key=${GROQ_API_KEY}
